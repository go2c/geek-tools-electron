<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excel 智能处理工具</title>
    <!-- <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/ant-design-icons@4.7.0/font/ant-design-icons.min.css"> -->
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            width: 100%;
            max-width: 900px;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
            position: relative;
        }

        .back-btn {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-50%) scale(1.05);
        }

        .header h1 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .content {
            padding: 40px;
        }

        .file-section {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 30px;
            border: 2px dashed #dee2e6;
            transition: all 0.3s ease;
        }

        .file-section:hover {
            border-color: #667eea;
            background: #f0f2ff;
        }

        .file-section h3 {
            font-size: 16px;
            color: #333;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .file-input-wrapper {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .file-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .file-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .file-btn:active {
            transform: translateY(0);
        }

        .file-name {
            flex: 1;
            color: #666;
            font-size: 14px;
            padding: 12px;
            background: white;
            border-radius: 8px;
            border: 1px solid #dee2e6;
        }

        .operation-section {
            margin-bottom: 30px;
        }

        .operation-section h3 {
            font-size: 16px;
            color: #333;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .operation-cards {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
        }

        .operation-card {
            background: white;
            border: 2px solid #e9ecef;
            border-radius: 12px;
            padding: 24px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .operation-card:hover {
            border-color: #667eea;
            transform: translateY(-4px);
            box-shadow: 0 8px 16px rgba(102, 126, 234, 0.2);
        }

        .operation-card.active {
            border-color: #667eea;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .operation-card .icon {
            font-size: 32px;
            margin-bottom: 12px;
            display: block;
        }

        .operation-card.active .icon {
            color: white;
        }

        .operation-card h4 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .operation-card p {
            font-size: 12px;
            opacity: 0.7;
        }

        .columns-section {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 30px;
            display: none;
        }

        .columns-section.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .columns-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .columns-header h4 {
            font-size: 14px;
            color: #333;
        }

        .columns-actions {
            display: flex;
            gap: 8px;
        }

        .btn-small {
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            border: 1px solid #dee2e6;
            background: white;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .btn-small:hover {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .columns-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 12px;
        }

        .column-checkbox {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 12px;
            background: white;
            border-radius: 8px;
            border: 1px solid #dee2e6;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .column-checkbox:hover {
            border-color: #667eea;
            background: #f0f2ff;
        }

        .column-checkbox input[type="checkbox"] {
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        .column-checkbox label {
            cursor: pointer;
            font-size: 14px;
            color: #333;
            flex: 1;
        }

        .process-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .process-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .process-btn:active:not(:disabled) {
            transform: translateY(0);
        }

        .process-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .status-section {
            margin-top: 30px;
            padding: 20px;
            border-radius: 12px;
            display: none;
        }

        .status-section.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        .status-info {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            padding: 16px;
            border-radius: 8px;
            line-height: 1.6;
        }

        .status-info.loading {
            background: #e7f3ff;
            color: #0066cc;
        }

        .status-info.success {
            background: #e8f5e9;
            color: #2e7d32;
        }

        .status-info.error {
            background: #ffebee;
            color: #c62828;
        }

        .status-icon {
            font-size: 20px;
            flex-shrink: 0;
        }

        .status-text {
            flex: 1;
        }

        .status-text strong {
            display: block;
            margin-bottom: 4px;
        }

        .file-path {
            margin-top: 8px;
            padding: 8px 12px;
            background: rgba(0, 0, 0, 0.05);
            border-radius: 6px;
            font-size: 12px;
            word-break: break-all;
            font-family: 'Courier New', monospace;
        }

        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #0066cc;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <button class="back-btn" id="backBtn">← 返回工具集</button>
            <h1>📊 Excel 智能处理工具</h1>
            <p>简单高效的 Excel 表格处理解决方案</p>
        </div>
        
        <div class="content">
            <!-- 文件选择区域 -->
            <div class="file-section">
                <h3>📁 选择 Excel 文件</h3>
                <div class="file-input-wrapper">
                    <button class="file-btn" id="selectFileBtn">
                        <span>📂</span>
                        选择文件
                    </button>
                    <div class="file-name" id="fileName">未选择文件</div>
                </div>
            </div>

            <!-- 操作类型选择 -->
            <div class="operation-section">
                <h3>⚙️ 选择操作类型</h3>
                <div class="operation-cards">
                    <div class="operation-card active" data-operation="merge">
                        <span class="icon">📊</span>
                        <h4>合并单元格</h4>
                        <p>合并相同值的单元格</p>
                    </div>
                    <div class="operation-card" data-operation="unmerge">
                        <span class="icon">📈</span>
                        <h4>取消合并</h4>
                        <p>拆分并填充相同值</p>
                    </div>
                    <div class="operation-card" data-operation="stats">
                        <span class="icon">📋</span>
                        <h4>分组统计</h4>
                        <p>按列分组统计</p>
                    </div>
                </div>
            </div>

            <!-- 列选择区域 -->
            <div class="columns-section active" id="columnsSection">
                <div class="columns-header">
                    <h4 id="columnsTitle">选择需要合并的列</h4>
                    <div class="columns-actions">
                        <button class="btn-small" id="selectAllBtn">全选</button>
                        <button class="btn-small" id="clearAllBtn">清空</button>
                    </div>
                </div>
                <div class="columns-grid" id="columnsGrid">
                    <!-- 列复选框将动态生成 -->
                </div>
            </div>

            <!-- 处理按钮 -->
            <button class="process-btn" id="processBtn" disabled>
                <span>⚡</span>
                开始处理
            </button>

            <!-- 状态提示 -->
            <div class="status-section" id="statusSection">
                <div class="status-info" id="statusInfo">
                    <!-- 状态信息将动态生成 -->
                </div>
            </div>
        </div>
    </div>

    <script src="renderer.js"></script>
</body>
</html>
