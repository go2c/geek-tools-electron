<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>工具集 - Geek Tools</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 800px;
            width: 100%;
        }

        .header {
            margin-bottom: 60px;
        }

        .header h1 {
            font-size: 48px;
            font-weight: 700;
            color: white;
            margin-bottom: 16px;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .header p {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.7);
        }

        .tools-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
        }

        .tool-card {
            background: white;
            border-radius: 20px;
            padding: 40px 32px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            border: 2px solid transparent;
        }

        .tool-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            border-color: rgba(102, 126, 234, 0.3);
        }

        .tool-card:active {
            transform: translateY(-4px);
        }

        .tool-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 24px;
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 40px;
            transition: transform 0.3s ease;
        }

        .tool-card:hover .tool-icon {
            transform: scale(1.1);
        }

        .tool-card:nth-child(1) .tool-icon {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .tool-card:nth-child(2) .tool-icon {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }

        .tool-card:nth-child(3) .tool-icon {
            background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%);
        }

        .tool-card h3 {
            font-size: 22px;
            font-weight: 600;
            color: #333;
            margin-bottom: 12px;
        }

        .tool-card p {
            font-size: 14px;
            color: #666;
            line-height: 1.6;
        }

        .footer {
            margin-top: 60px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 13px;
        }

        @media (max-width: 600px) {
            .tools-grid {
                grid-template-columns: 1fr;
            }

            .header h1 {
                font-size: 32px;
            }

            .tool-card {
                padding: 30px 24px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔧 Geek Tools</h1>
            <p>选择一个工具开始使用</p>
        </div>

        <div class="tools-grid">
            <div class="tool-card" id="excelTool">
                <div class="tool-icon">📊</div>
                <h3>Excel智能处理</h3>
                <p>合并/取消合并单元格、分组统计，轻松处理表格数据</p>
            </div>

            <div class="tool-card" id="imageCompressor">
                <div class="tool-icon">🖼️</div>
                <h3>图片压缩工具</h3>
                <p>快速压缩图片大小，支持多种压缩参数调节，一键复制保存</p>
            </div>

            <div class="tool-card" id="removeWatermark">
                <div class="tool-icon">✨</div>
                <h3>图片去水印工具</h3>
                <p>智能去除图片水印，涂抹水印区域即可自动修复</p>
            </div>
        </div>

        <div class="footer">
            Geek Tools - 实用工具集
        </div>
    </div>

    <script>
        document.getElementById('excelTool').addEventListener('click', () => {
            window.electronAPI.navigateTo('excel-tool');
        });

        document.getElementById('imageCompressor').addEventListener('click', () => {
            window.electronAPI.navigateTo('image-compressor');
        });

        document.getElementById('removeWatermark').addEventListener('click', () => {
            window.electronAPI.navigateTo('remove-watermark');
        });
    </script>
</body>
</html>
